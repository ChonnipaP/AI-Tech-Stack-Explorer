name: ai_techstack_explorer
description: "AI-powered stock news analyzer with Bloomberg dark theme."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Architecture
  get_it: ^9.2.1
  dartz: ^0.10.1

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Navigation (ปรับลดลงมาเพื่อให้เข้ากับ generator รุ่นที่เสถียร)
  auto_route: ^8.3.0

  # Networking
  dio: ^5.4.3+1

  # JSON (ลด annotation ลงมาเพื่อให้สัมพันธ์กับ generator)
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Local Database (Drift)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.41
  path_provider: ^2.1.2
  path: ^1.9.0

  # Key-Value Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # ML Kit
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2

  # ENV
  flutter_dotenv: ^6.0.0

  # UI
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  drift_dev: ^2.18.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  auto_route_generator: ^8.0.0
  build_resolvers: ^2.4.2
  mocktail: ^1.0.4
  bloc_test: ^9.1.7
  integration_test:
    sdk: flutter

dependency_overrides:
  test_api: 0.6.1
  web: ^0.5.1

# ลบส่วน dependency_overrides ทิ้งไปเลยครับ (ไม่ต้องใส่แล้ว)

  # Testing
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - .env